<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyago Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        :root {
            --maroon: #6E1F2B;
            --maroon-dark: #4d1520;
            --maroon-light: rgba(110, 31, 43, .08);
            --gold: #D9A441;
            --gold-light: rgba(217, 164, 65, .12);
            --rust: #A35334;
            --ivory: #F5EFE6;
            --ivory-deep: #EDE5D8;
            --dark: #0d0605;
            --text: #2A1A1A;
            --text-muted: #7a6a64;
            --light-gray: #E8E3DC;
            --medium-gray: #8B8680;
            --green: #4A7C59;
            --green-light: rgba(74, 124, 89, .1);
            --red: #D32F2F;
            --red-light: rgba(211, 47, 47, .1);
            --blue: #1976D2;
            --blue-light: rgba(25, 118, 210, .1);
            --orange: #FF7A00;
            --orange-light: rgba(255, 122, 0, .1);
            --white: #FFFFFF;
            --font-body: 'Inter', system-ui, sans-serif;
            --font-heading: 'Playfair Display', serif;
            --sidebar-w: 272px;
            --header-h: 64px;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 2px 12px rgba(13, 6, 5, .06);
            --shadow-lg: 0 10px 40px rgba(13, 6, 5, .12);
            --transition: .3s cubic-bezier(.4, 0, .2, 1)
        }

        html {
            font-size: 15px;
            background: var(--ivory);
            overflow-x: hidden
        }

        body {
            font-family: var(--font-body);
            color: var(--text);
            background: var(--ivory);
            line-height: 1.6;
            overflow-x: hidden
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px
        }

        ::-webkit-scrollbar-track {
            background: transparent
        }

        ::-webkit-scrollbar-thumb {
            background: var(--light-gray);
            border-radius: 3px
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--medium-gray)
        }

        @keyframes fadeIn {
            from {
                opacity: 0
            }

            to {
                opacity: 1
            }
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0
            }

            to {
                transform: translateX(0);
                opacity: 1
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(.92);
                opacity: 0
            }

            to {
                transform: scale(1);
                opacity: 1
            }
        }

        .fade-in {
            animation: fadeIn .3s ease
        }

        .scale-in {
            animation: scaleIn .3s ease
        }

        .app {
            display: flex;
            min-height: 100vh
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            z-index: 90;
            backdrop-filter: blur(2px)
        }

        .sidebar-overlay.active {
            display: block
        }

        .sidebar {
            width: var(--sidebar-w);
            background: var(--white);
            border-right: 1px solid var(--light-gray);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
            z-index: 100;
            overflow-y: auto;
            transition: transform var(--transition)
        }

        .sidebar-head {
            padding: 20px 18px;
            border-bottom: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            gap: 12px
        }

        .sidebar-logo {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--maroon), var(--rust));
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-heading);
            font-weight: 700;
            font-size: 18px;
            flex-shrink: 0
        }

        .sidebar-brand {
            font-family: var(--font-heading);
            font-size: 22px;
            font-weight: 700;
            color: var(--maroon);
            letter-spacing: .06em
        }

        .sidebar-nav {
            flex: 1;
            padding: 14px 10px;
            display: flex;
            flex-direction: column;
            gap: 4px
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 16px;
            border: none;
            background: transparent;
            color: var(--medium-gray);
            cursor: pointer;
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            font-weight: 500;
            transition: all var(--transition);
            text-align: left;
            width: 100%
        }

        .nav-item:hover {
            background: var(--ivory);
            color: var(--maroon)
        }

        .nav-item.active {
            background: var(--maroon-light);
            color: var(--maroon);
            border-left: 3px solid var(--maroon);
            padding-left: 13px;
            font-weight: 600
        }

        .nav-item svg {
            flex-shrink: 0
        }

        .nav-section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: .14em;
            text-transform: uppercase;
            color: var(--medium-gray);
            padding: 18px 16px 6px;
            opacity: .7
        }

        .sidebar-foot {
            padding: 14px 18px;
            border-top: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            gap: 12px
        }

        .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--maroon);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            flex-shrink: 0
        }

        .sidebar-user-name {
            font-weight: 600;
            font-size: 13px;
            color: var(--text)
        }

        .sidebar-user-role {
            font-size: 11px;
            color: var(--medium-gray)
        }

        .sidebar-close {
            display: none;
            position: absolute;
            top: 14px;
            right: 14px;
            background: none;
            border: none;
            font-size: 22px;
            color: var(--medium-gray);
            cursor: pointer;
            z-index: 101
        }

        .main {
            flex: 1;
            margin-left: var(--sidebar-w);
            display: flex;
            flex-direction: column;
            background: var(--ivory);
            min-width: 0
        }

        .header {
            background: var(--white);
            border-bottom: 1px solid var(--light-gray);
            padding: 0 28px;
            height: var(--header-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 50
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 6px;
            color: var(--medium-gray)
        }

        .header-title {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 700;
            color: var(--maroon)
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px
        }

        .header-time {
            font-size: 13px;
            color: var(--medium-gray);
            font-weight: 500;
            font-variant-numeric: tabular-nums
        }

        .header-btn {
            position: relative;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            color: var(--medium-gray);
            transition: color var(--transition);
            display: flex;
            align-items: center
        }

        .header-btn:hover {
            color: var(--maroon)
        }

        .notif-badge {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--red);
            color: var(--white);
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 28px;
            min-width: 0
        }

        .section {
            display: none
        }

        .section.active {
            display: block;
            animation: fadeIn .35s ease
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 16px;
            margin-bottom: 28px
        }

        .stat-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            padding: 20px;
            transition: transform var(--transition), box-shadow var(--transition)
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg)
        }

        .stat-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px
        }

        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0
        }

        .stat-icon.maroon {
            background: var(--maroon-light);
            color: var(--maroon)
        }

        .stat-icon.green {
            background: var(--green-light);
            color: var(--green)
        }

        .stat-icon.blue {
            background: var(--blue-light);
            color: var(--blue)
        }

        .stat-icon.orange {
            background: var(--orange-light);
            color: var(--orange)
        }

        .stat-icon.gold {
            background: var(--gold-light);
            color: var(--rust)
        }

        .stat-trend {
            font-size: 11px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 6px
        }

        .stat-trend.up {
            background: var(--green-light);
            color: var(--green)
        }

        .stat-trend.down {
            background: var(--red-light);
            color: var(--red)
        }

        .stat-label {
            font-size: 12.5px;
            color: var(--medium-gray);
            font-weight: 500;
            margin-bottom: 4px
        }

        .stat-value {
            font-size: 26px;
            font-weight: 800;
            color: var(--dark);
            font-variant-numeric: tabular-nums
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 28px
        }

        .chart-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            padding: 20px
        }

        .chart-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px
        }

        .chart-card h3 svg {
            color: var(--maroon)
        }

        .chart-card canvas {
            max-height: 280px
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            font-family: var(--font-body);
            transition: all var(--transition);
            white-space: nowrap
        }

        .btn:active {
            transform: scale(.97)
        }

        .btn-primary {
            background: var(--maroon);
            color: var(--white)
        }

        .btn-primary:hover {
            background: var(--maroon-dark);
            box-shadow: 0 4px 16px rgba(110, 31, 43, .3);
            transform: translateY(-1px)
        }

        .btn-secondary {
            background: var(--white);
            color: var(--maroon);
            border: 1.5px solid var(--maroon)
        }

        .btn-secondary:hover {
            background: var(--maroon);
            color: var(--white)
        }

        .btn-danger {
            background: var(--red);
            color: var(--white)
        }

        .btn-danger:hover {
            background: #b71c1c
        }

        .btn-ghost {
            background: transparent;
            color: var(--medium-gray);
            border: 1.5px solid var(--light-gray)
        }

        .btn-ghost:hover {
            border-color: var(--maroon);
            color: var(--maroon)
        }

        .btn-success {
            background: var(--green);
            color: var(--white)
        }

        .btn-success:hover {
            background: #3a6348
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px
        }

        .btn-icon {
            padding: 8px;
            width: 34px;
            height: 34px;
            justify-content: center
        }

        .btn-block {
            width: 100%;
            justify-content: center
        }

        .filters-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap
        }

        .filter-input,
        .filter-select {
            padding: 9px 14px;
            border: 1px solid var(--light-gray);
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-family: var(--font-body);
            color: var(--text);
            background: var(--white);
            transition: border-color var(--transition)
        }

        .filter-input::placeholder {
            color: var(--medium-gray)
        }

        .filter-input:focus,
        .filter-select:focus {
            outline: none;
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px var(--maroon-light)
        }

        .filter-input {
            min-width: 200px
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .03em
        }

        .badge-green {
            background: var(--green-light);
            color: var(--green)
        }

        .badge-blue {
            background: var(--blue-light);
            color: var(--blue)
        }

        .badge-orange {
            background: var(--orange-light);
            color: var(--orange)
        }

        .badge-red {
            background: var(--red-light);
            color: var(--red)
        }

        .badge-gold {
            background: var(--gold-light);
            color: var(--rust)
        }

        .badge-gray {
            background: rgba(0, 0, 0, .06);
            color: var(--medium-gray)
        }

        .badge-maroon {
            background: var(--maroon-light);
            color: var(--maroon)
        }

        .admin-vehicles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 24px
        }

        .admin-v-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition)
        }

        .admin-v-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg)
        }

        .admin-v-card.disabled-card {
            opacity: .55
        }

        .admin-v-card.disabled-card:hover {
            transform: none;
            box-shadow: var(--shadow)
        }

        .admin-v-img {
            height: 180px;
            background: linear-gradient(135deg, var(--maroon), var(--rust));
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .admin-v-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .5s ease
        }

        .admin-v-card:hover .admin-v-img img {
            transform: scale(1.05)
        }

        .admin-v-img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13, 6, 5, .5), transparent 60%)
        }

        .admin-v-badge {
            position: absolute;
            top: 12px;
            left: 12px
        }

        .admin-v-type {
            position: absolute;
            bottom: 12px;
            left: 12px;
            color: var(--white);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .1em;
            text-transform: uppercase;
            opacity: .9
        }

        .admin-v-status {
            position: absolute;
            top: 12px;
            right: 12px
        }

        .admin-v-body {
            padding: 16px
        }

        .admin-v-name {
            font-family: var(--font-heading);
            font-size: 17px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 4px
        }

        .admin-v-slug {
            font-size: 11px;
            color: var(--medium-gray);
            margin-bottom: 10px;
            font-family: monospace
        }

        .admin-v-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 14px
        }

        .admin-v-detail {
            font-size: 12px;
            color: var(--medium-gray);
            display: flex;
            align-items: center;
            gap: 5px
        }

        .admin-v-detail strong {
            color: var(--text);
            font-weight: 600
        }

        .admin-v-price {
            font-size: 20px;
            font-weight: 800;
            color: var(--maroon);
            margin-bottom: 14px
        }

        .admin-v-price span {
            font-size: 12px;
            font-weight: 500;
            color: var(--medium-gray)
        }

        .admin-v-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .modal-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13, 6, 5, .55);
            z-index: 2000;
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center
        }

        .modal-backdrop.active {
            display: flex;
            animation: fadeIn .2s ease
        }

        .modal {
            background: var(--white);
            border-radius: var(--radius);
            width: 94%;
            max-width: 820px;
            max-height: 92vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(13, 6, 5, .3);
            animation: scaleIn .25s ease
        }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px;
            border-bottom: 1px solid var(--light-gray);
            position: sticky;
            top: 0;
            background: var(--white);
            z-index: 5;
            border-radius: var(--radius) var(--radius) 0 0
        }

        .modal-head h3 {
            font-family: var(--font-heading);
            font-size: 20px;
            font-weight: 700;
            color: var(--maroon)
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--medium-gray);
            cursor: pointer;
            padding: 4px;
            line-height: 1;
            transition: color var(--transition)
        }

        .modal-close:hover {
            color: var(--red)
        }

        .modal-body {
            padding: 24px
        }

        .modal-foot {
            padding: 16px 24px;
            border-top: 1px solid var(--light-gray);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            position: sticky;
            bottom: 0;
            background: var(--white);
            z-index: 5
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px
        }

        .form-row.full {
            grid-template-columns: 1fr
        }

        .form-row.triple {
            grid-template-columns: 1fr 1fr 1fr
        }

        .form-group {
            margin-bottom: 0
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            font-size: 13px;
            color: var(--text)
        }

        .form-group label .req {
            color: var(--red)
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--light-gray);
            border-radius: var(--radius-sm);
            font-size: 13.5px;
            font-family: var(--font-body);
            color: var(--text);
            background: var(--white);
            transition: border-color var(--transition), box-shadow var(--transition)
        }

        .form-control:focus {
            outline: none;
            border-color: var(--maroon);
            box-shadow: 0 0 0 3px var(--maroon-light)
        }

        .form-control::placeholder {
            color: var(--medium-gray)
        }

        textarea.form-control {
            resize: vertical;
            min-height: 80px
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 12 12' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M2 4l4 4 4-4' stroke='%237a6a64' stroke-width='1.6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 14px center;
            padding-right: 36px
        }

        .form-hint {
            font-size: 11px;
            color: var(--medium-gray);
            margin-top: 4px
        }

        .form-error {
            font-size: 11px;
            color: var(--red);
            margin-top: 4px;
            display: none
        }

        .form-group.error .form-control {
            border-color: var(--red)
        }

        .form-group.error .form-error {
            display: block
        }

        .form-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--light-gray);
            overflow-x: auto
        }

        .form-tab-btn {
            padding: 11px 16px;
            background: none;
            border: none;
            color: var(--medium-gray);
            cursor: pointer;
            font-size: 12.5px;
            font-weight: 600;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all var(--transition);
            white-space: nowrap;
            font-family: var(--font-body)
        }

        .form-tab-btn:hover {
            color: var(--maroon)
        }

        .form-tab-btn.active {
            color: var(--maroon);
            border-bottom-color: var(--maroon)
        }

        .form-tab-pane {
            display: none
        }

        .form-tab-pane.active {
            display: block;
            animation: fadeIn .25s ease
        }

        .img-list {
            display: flex;
            flex-direction: column;
            gap: 10px
        }

        .img-list-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            background: var(--ivory);
            border-radius: var(--radius-sm);
            border: 1px solid var(--light-gray)
        }

        .img-list-item img {
            width: 64px;
            height: 44px;
            object-fit: cover;
            border-radius: 4px;
            background: var(--light-gray)
        }

        .img-list-item input {
            flex: 1
        }

        .img-list-item .remove-img {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            line-height: 1
        }

        .features-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px
        }

        .feature-check {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            border: 1.5px solid var(--light-gray);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all .15s;
            font-size: 13px;
            user-select: none
        }

        .feature-check:hover {
            border-color: var(--maroon);
            background: var(--maroon-light)
        }

        .feature-check.checked {
            border-color: var(--maroon);
            background: var(--maroon-light);
            color: var(--maroon);
            font-weight: 600
        }

        .feature-check input {
            display: none
        }

        .routes-list {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .route-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            background: var(--ivory);
            border-radius: var(--radius-sm);
            border: 1px solid var(--light-gray)
        }

        .route-emoji {
            font-size: 20px;
            width: 32px;
            text-align: center
        }

        .route-item input {
            flex: 1
        }

        .route-item .remove-route {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 18px;
            padding: 4px
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px
        }

        .toggle-wrap {
            display: flex;
            align-items: center;
            gap: 12px
        }

        .toggle-track {
            width: 44px;
            height: 24px;
            border-radius: 12px;
            background: var(--light-gray);
            position: relative;
            cursor: pointer;
            transition: background var(--transition);
            flex-shrink: 0
        }

        .toggle-track.on {
            background: var(--green)
        }

        .toggle-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--white);
            position: absolute;
            top: 2px;
            left: 2px;
            transition: transform var(--transition);
            box-shadow: 0 1px 4px rgba(0, 0, 0, .15)
        }

        .toggle-track.on .toggle-thumb {
            transform: translateX(20px)
        }

        .toggle-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text)
        }

        .panel-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(13, 6, 5, .3);
            z-index: 1500
        }

        .panel-overlay.active {
            display: block
        }

        .slide-panel {
            position: fixed;
            right: -520px;
            top: 0;
            width: 500px;
            max-width: 94vw;
            height: 100vh;
            background: var(--white);
            box-shadow: -4px 0 24px rgba(13, 6, 5, .12);
            z-index: 1600;
            transition: right .35s cubic-bezier(.4, 0, .2, 1);
            overflow-y: auto
        }

        .slide-panel.active {
            right: 0
        }

        .slide-panel-head {
            padding: 20px 24px;
            border-bottom: 1px solid var(--light-gray);
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--white);
            z-index: 2
        }

        .slide-panel-head h3 {
            font-family: var(--font-heading);
            font-size: 18px;
            font-weight: 700;
            color: var(--maroon)
        }

        .slide-panel-body {
            padding: 24px
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--light-gray);
            font-size: 13px
        }

        .detail-row:last-child {
            border-bottom: none
        }

        .detail-label {
            color: var(--medium-gray);
            font-weight: 500
        }

        .detail-value {
            color: var(--text);
            font-weight: 600;
            text-align: right;
            max-width: 60%
        }

        .detail-section-title {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--maroon);
            margin: 20px 0 10px;
            padding-bottom: 6px;
            border-bottom: 2px solid var(--maroon-light)
        }

        .panel-img-main {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: var(--radius-sm);
            margin-bottom: 12px;
            background: var(--light-gray)
        }

        .panel-img-thumbs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 4px
        }

        .panel-img-thumbs img {
            width: 72px;
            height: 50px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color .15s;
            flex-shrink: 0
        }

        .panel-img-thumbs img:hover,
        .panel-img-thumbs img.active {
            border-color: var(--maroon)
        }

        .panel-specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px
        }

        .panel-spec-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            padding: 6px 8px;
            background: var(--ivory);
            border-radius: 6px
        }

        .panel-spec-item svg {
            color: var(--maroon);
            flex-shrink: 0
        }

        .panel-feature-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            background: var(--green-light);
            color: var(--green);
            border-radius: 6px;
            font-size: 11.5px;
            font-weight: 600;
            margin: 3px
        }

        .panel-route-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 5px 10px;
            background: var(--gold-light);
            color: var(--rust);
            border-radius: 6px;
            font-size: 11.5px;
            font-weight: 600;
            margin: 3px
        }

        #toastBox {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none
        }

        .toast {
            background: var(--dark);
            color: var(--white);
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            animation: slideInRight .35s ease;
            min-width: 280px;
            pointer-events: auto;
            font-size: 13px;
            font-weight: 500
        }

        .toast.success {
            border-left: 4px solid var(--green)
        }

        .toast.error {
            border-left: 4px solid var(--red)
        }

        .toast.warning {
            border-left: 4px solid var(--orange)
        }

        .toast.info {
            border-left: 4px solid var(--blue)
        }

        .toast-close {
            background: none;
            border: none;
            color: rgba(255, 255, 255, .6);
            cursor: pointer;
            font-size: 18px;
            padding: 0 0 0 8px
        }

        .confirm-icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--red-light);
            color: var(--red);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px
        }

        .confirm-text {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.7
        }

        .confirm-text strong {
            color: var(--text)
        }

        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--medium-gray)
        }

        .empty-state svg {
            opacity: .4;
            margin-bottom: 16px
        }

        .empty-state h3 {
            font-family: var(--font-heading);
            font-size: 18px;
            color: var(--text);
            margin-bottom: 8px
        }

        .empty-state p {
            font-size: 13px;
            max-width: 340px;
            margin: 0 auto 20px
        }

        .activity-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            padding: 20px
        }

        .activity-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 14px
        }

        .activity-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 320px;
            overflow-y: auto
        }

        .activity-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            border-radius: var(--radius-sm);
            background: var(--ivory)
        }

        .activity-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 14px
        }

        .activity-dot.green {
            background: var(--green-light);
            color: var(--green)
        }

        .activity-dot.blue {
            background: var(--blue-light);
            color: var(--blue)
        }

        .activity-dot.orange {
            background: var(--orange-light);
            color: var(--orange)
        }

        .activity-dot.gold {
            background: var(--gold-light);
            color: var(--gold)
        }

        .activity-text {
            flex: 1;
            min-width: 0
        }

        .activity-text strong {
            font-size: 13px;
            color: var(--text)
        }

        .activity-text p {
            font-size: 12px;
            color: var(--medium-gray);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .activity-time {
            font-size: 11px;
            color: var(--medium-gray);
            white-space: nowrap;
            flex-shrink: 0
        }

        .data-table-wrap {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            overflow: hidden;
            margin-bottom: 24px
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px
        }

        .data-table thead {
            background: var(--ivory)
        }

        .data-table th {
            padding: 12px 16px;
            text-align: left;
            font-weight: 700;
            font-size: 11.5px;
            letter-spacing: .05em;
            text-transform: uppercase;
            color: var(--medium-gray);
            border-bottom: 2px solid var(--light-gray)
        }

        .data-table td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--light-gray);
            color: var(--text)
        }

        .data-table tbody tr {
            transition: background .15s
        }

        .data-table tbody tr:hover {
            background: var(--maroon-light)
        }

        .data-table tbody tr:last-child td {
            border-bottom: none
        }

        .table-responsive {
            overflow-x: auto
        }

        .pkg-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 24px
        }

        .admin-pkg-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform var(--transition), box-shadow var(--transition)
        }

        .admin-pkg-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg)
        }

        .admin-pkg-card.disabled-card {
            opacity: .55
        }

        .admin-pkg-card.disabled-card:hover {
            transform: none;
            box-shadow: var(--shadow)
        }

        .admin-pkg-img {
            height: 180px;
            position: relative;
            overflow: hidden
        }

        .admin-pkg-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform .5s ease
        }

        .admin-pkg-card:hover .admin-pkg-img img {
            transform: scale(1.05)
        }

        .admin-pkg-img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(13, 6, 5, .6), transparent 50%)
        }

        .admin-pkg-cat {
            position: absolute;
            top: 12px;
            left: 12px
        }

        .admin-pkg-duration {
            position: absolute;
            bottom: 12px;
            left: 12px;
            color: var(--white);
            font-size: 12px;
            font-weight: 600;
            background: rgba(0, 0, 0, .45);
            padding: 4px 10px;
            border-radius: 6px;
            backdrop-filter: blur(4px)
        }

        .admin-pkg-status {
            position: absolute;
            top: 12px;
            right: 12px
        }

        .admin-pkg-body {
            padding: 16px
        }

        .admin-pkg-name {
            font-family: var(--font-heading);
            font-size: 17px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 6px
        }

        .admin-pkg-desc {
            font-size: 12.5px;
            color: var(--medium-gray);
            margin-bottom: 12px;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden
        }

        .admin-pkg-includes {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px
        }

        .admin-pkg-include-tag {
            font-size: 11px;
            padding: 3px 8px;
            background: var(--ivory);
            border: 1px solid var(--light-gray);
            border-radius: 5px;
            color: var(--text)
        }

        .admin-pkg-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px
        }

        .admin-pkg-price {
            font-size: 22px;
            font-weight: 800;
            color: var(--maroon)
        }

        .admin-pkg-price span {
            font-size: 12px;
            font-weight: 500;
            color: var(--medium-gray)
        }

        .admin-pkg-rating {
            font-size: 12px;
            color: var(--gold)
        }

        .admin-pkg-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .settings-card {
            background: var(--white);
            border: 1px solid var(--light-gray);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 20px
        }

        .settings-card h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--maroon);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--maroon-light)
        }

        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid var(--light-gray)
        }

        .settings-row:last-child {
            border-bottom: none
        }

        .settings-row-info h4 {
            font-size: 13.5px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 2px
        }

        .settings-row-info p {
            font-size: 12px;
            color: var(--medium-gray)
        }

        .includes-list {
            display: flex;
            flex-direction: column;
            gap: 8px
        }

        .includes-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            background: var(--ivory);
            border-radius: var(--radius-sm);
            border: 1px solid var(--light-gray)
        }

        .includes-item input {
            flex: 1
        }

        .includes-item .remove-include {
            background: none;
            border: none;
            color: var(--red);
            cursor: pointer;
            font-size: 18px;
            padding: 4px;
            line-height: 1
        }

        @media(max-width:1100px) {
            .charts-grid {
                grid-template-columns: 1fr
            }

            .admin-vehicles-grid,
            .pkg-grid {
                grid-template-columns: repeat(auto-fill, minmax(280px, 1fr))
            }
        }

        @media(max-width:768px) {
            .sidebar {
                transform: translateX(-100%);
                width: 260px
            }

            .sidebar.open {
                transform: translateX(0)
            }

            .sidebar-close {
                display: block
            }

            .main {
                margin-left: 0 !important
            }

            .hamburger {
                display: flex !important
            }

            .stats-grid {
                grid-template-columns: 1fr 1fr
            }

            .form-row {
                grid-template-columns: 1fr
            }

            .form-row.triple {
                grid-template-columns: 1fr
            }

            .admin-vehicles-grid,
            .pkg-grid {
                grid-template-columns: 1fr
            }

            .content {
                padding: 16px
            }

            .header {
                padding: 0 16px
            }

            .slide-panel {
                width: 100vw;
                max-width: 100vw
            }

            .modal {
                width: 98%;
                max-height: 96vh
            }

            .features-grid {
                grid-template-columns: 1fr
            }

            .pricing-grid {
                grid-template-columns: 1fr
            }
        }

        @media(max-width:480px) {
            .stats-grid {
                grid-template-columns: 1fr
            }

            .filters-bar {
                flex-wrap: nowrap;
                overflow-x: auto;
                padding-bottom: 4px
            }

            .filter-input {
                min-width: 160px;
                flex: 1
            }
        }

        @media(prefers-reduced-motion:reduce) {

            *,
            *::before,
            *::after {
                animation-duration: .01ms !important;
                transition-duration: .01ms !important
            }
        }
    </style>
</head>

                    </svg>
                    Settings

            <div class="sidebar-foot">
